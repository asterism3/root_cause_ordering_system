name: Process Farmer Foodshare Invoices

on:
  schedule:
    # Runs at 8:00 AM UTC every Monday
    - cron: '0 8 * * 1' 
  workflow_dispatch: # Allows you to trigger it manually via a button

jobs:
  extract-and-process:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Extraction Script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python scripts/extractor.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'GitHub Action Bot'
        git config --global user.email 'action@github.com'
        git add data/
        git commit -m "Automated data extraction - $(date)" || exit 0
        git push
